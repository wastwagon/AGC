# Africa Governance Centre - Docker Compose
# For local development and Coolify deployment

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agc-web
    restart: unless-stopped
    ports:
      - "9200:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
