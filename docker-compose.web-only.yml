# =============================================================================
# Web service only (Coolify / external Postgres + Redis)
# =============================================================================
# Use when your database and Redis are managed by Coolify or another host.
# Set DATABASE_URL and REDIS_URL in Coolify to point at those services.
#
#   docker compose -f docker-compose.web-only.yml up -d --build
# =============================================================================

name: agc-web

services:
  migrate:
    build:
      context: ./agc-site
      dockerfile: Dockerfile.migrate
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SKIP_DB_SEED_ON_DEPLOY=${SKIP_DB_SEED_ON_DEPLOY:-0}
    restart: "no"

  web:
    build:
      context: ./agc-site
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${WEB_PORT:-9200}:3000"
    volumes:
      - agc-media-uploads:/app/public/uploads
      - agc-media-metadata:/app/data
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:9200}
      - AUTH_URL=${AUTH_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/api/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

volumes:
  agc-media-uploads:
  agc-media-metadata:
