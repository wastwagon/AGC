# =============================================================================
# Web service only (Coolify / external Postgres + Redis)
# =============================================================================
# Use when your database and Redis are managed by Coolify or another host.
# Set DATABASE_URL and REDIS_URL in Coolify to point at those services.
#
#   docker compose -f docker-compose.web-only.yml up -d --build
# =============================================================================

name: agc-web

services:
  web:
    build:
      context: ./agc-site
      dockerfile: Dockerfile
    container_name: agc-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-9200}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:9200}
      - AUTH_URL=${AUTH_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
